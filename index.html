<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VTT Greco | Mesa RPG 3D</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    
    <script type="module" src="js/main.js" defer></script>
</head>
<body>
    <div id="vtt-canvas"></div>

    <div id="ui-layer">
        <div class="panel" id="main-panel">
            <div class="panel-header">
                <div class="panel-tabs">
                    <button class="main-tab-btn active" data-main-tab="mapa">Mapa</button>
                    <button class="main-tab-btn" data-main-tab="lib">Biblioteca</button>
                    <button class="main-tab-btn" data-main-tab="sys">Sistema</button>
                </div>
                <button id="btn-toggle-panel" title="Recolher/Expandir" aria-label="Recolher ou expandir painel">_</button>
            </div>

            <div id="panel-body">
                <!-- ABA MAPA -->
            <div id="tab-content-mapa" class="main-tab-content">
                <label>Modelos:</label>
                <select id="select-preset">
                    <option value="empty">Mapa Vazio</option>
                    <option value="forest">Floresta</option>
                    <option value="city">Cidade</option>
                    <option value="desert">Deserto</option>
                </select>

                <label>Terreno:</label>
                <select id="select-terrain">
                    <option value="grass">Grama</option>
                    <option value="stone">Pedra</option>
                    <option value="snow">Neve</option>
                    <option value="custom">URL Imagem</option>
                </select>

                <div id="custom-texture-container" class="hidden">
                    <input type="text" id="input-terrain-url" placeholder="URL da Imagem">
                    <button id="btn-apply-texture">Aplicar</button>
                </div>

                <label>Dimensões:</label>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="map-width" value="25">
                    <input type="number" id="map-height" value="25">
                </div>
                <button id="btn-apply-size">Redimensionar</button>
                
                <label>Horário:</label>
                <select id="select-time">
                    <option value="day">Dia</option>
                    <option value="afternoon">Tarde</option>
                    <option value="night">Noite</option>
                </select>

                <label>Fundo do Horizonte:</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="input-bg-url" placeholder="URL da imagem">
                    <button id="btn-apply-bg" style="width: 60px; margin: 0; padding: 0;">Ok</button>
                </div>

                <button id="btn-open-assets" style="margin-top: 15px; background: #e67e22;">Gerenciar Terrenos/Modelos</button>

                <div style="display: flex; align-items: center; gap: 8px; margin-top: 10px;">
                    <input type="checkbox" id="check-lock-scenery" checked style="width: auto; margin: 0;">
                    <label style="margin: 0; cursor: pointer;" for="check-lock-scenery">Travar Cenários</label>
                </div>
            </div>

            <!-- ABA BIBLIOTECA (Simplificada no painel) -->
            <div id="tab-content-lib" class="main-tab-content hidden">
                <button id="btn-open-library" style="background: #e67e22; margin-top: 10px;">Gerenciar Biblioteca</button>
                <p style="font-size: 10px; color: #888; margin-top: 10px;">Abra a biblioteca para adicionar novos heróis e monstros ao mapa.</p>
            </div>

            <!-- ABA SISTEMA -->
            <div id="tab-content-sys" class="main-tab-content hidden">
                <button id="btn-save-new" style="background: #27ae60;">Salvar Novo Mapa</button>
                <button id="btn-open-maps" style="background: #2980b9; margin-top: 5px;">Meus Mapas</button>
            </div>
        </div>
    </div>
</div>

    <!-- MODAL DE MAPAS -->
    <div id="maps-modal" class="hidden">
        <div class="library-content">
            <div class="library-header">
                <h2>Meus Mapas Salvos</h2>
                <button id="btn-close-maps" aria-label="Fechar mapas">X</button>
            </div>
            <div id="maps-grid" class="library-grid">
                <!-- Mapas carregados via JS -->
            </div>
        </div>
    </div>

    <!-- MODAL DE ASSETS (TERRENOS E MODELOS) -->
    <div id="assets-modal" class="hidden">
        <div class="library-content">
            <div class="library-header">
                <h2>Gerenciar Terrenos e Modelos</h2>
                <button id="btn-close-assets" class="btn-close-modal" aria-label="Fechar assets">X</button>
            </div>
            <div class="library-tabs">
                <button class="tab-btn-asset active" data-asset-tab="terreno">Terrenos</button>
                <button class="tab-btn-asset" data-asset-tab="modelo">Modelos</button>
            </div>
            <div id="assets-grid" class="library-grid">
                <!-- Assets carregados via JS -->
            </div>
            <div id="new-asset-form" class="hidden asset-form-container">
                <h3 id="asset-form-title">Novo Terreno</h3>
                <input type="hidden" id="edit-asset-id">
                <label>Nome:</label>
                <input type="text" id="new-asset-nome">
                <label id="label-asset-url">URL da Imagem:</label>
                <input type="text" id="new-asset-url">
                <div id="container-asset-bg" class="hidden">
                    <label>URL Fundo do Horizonte:</label>
                    <input type="text" id="new-asset-bg">
                </div>
                <button id="btn-create-asset" style="background: #27ae60; margin-top: 10px;">Salvar</button>
            </div>
            <div style="padding: 10px; border-top: 1px solid #444;">
                <button id="btn-show-asset-form" style="background: #27ae60;">+ Adicionar Novo</button>
            </div>
        </div>
    </div>

    <!-- MODAL DA BIBLIOTECA -->
    <div id="library-modal" class="hidden">
        <div class="library-content">
            <div class="library-header">
                <h2>Biblioteca de Elementos</h2>
                <button id="btn-close-library" aria-label="Fechar biblioteca">X</button>
            </div>
            
            <div class="library-tabs">
                <button class="tab-btn active" data-tab="heroi">Heróis</button>
                <button class="tab-btn" data-tab="monstro">Monstros</button>
                <button class="tab-btn" data-tab="item">Cenário</button>
                <button class="tab-btn" data-tab="novo" style="background: #27ae60;">+ Novo</button>
            </div>

            <div id="library-grid" class="library-grid">
                <!-- Itens carregados via JS -->
            </div>

            <div id="new-item-form" class="hidden">
                <h3>Cadastrar Novo Elemento</h3>
                
                <label for="new-nome">Nome do Elemento:</label>
                <input type="text" id="new-nome" placeholder="Ex: Guerreiro, Árvore...">
                
                <label for="new-tipo">Tipo de Elemento:</label>
                <select id="new-tipo">
                    <option value="criatura">Criatura (Personagens)</option>
                    <option value="cenario">Cenário (Objetos)</option>
                </select>
                
                <label for="new-categoria">Categoria:</label>
                <select id="new-categoria">
                    <option value="heroi">Herói</option>
                    <option value="monstro">Monstro</option>
                    <option value="item">Cenário</option>
                </select>
                
                <label for="new-tamanho">Tamanho (em quadrados):</label>
                <input type="number" id="new-tamanho" value="1">
                
                <label for="new-alcance">Alcance de Ataque (quadrados):</label>
                <input type="number" id="new-alcance" value="1">

                <label for="new-deslocamento">Deslocamento (quadrados):</label>
                <input type="number" id="new-deslocamento" value="6">
                
                <label for="new-imagem">URL da Imagem:</label>
                <input type="text" id="new-imagem" placeholder="https://...">
                
                <label for="new-cor">Cor da Base:</label>
                <input type="color" id="new-cor" value="#d4af37">
                
                <button id="btn-create-item">Salvar na Biblioteca</button>
            </div>
        </div>
    </div>

    <div id="context-menu" class="hidden">
        <ul>
            <li id="menu-range">Mostrar Alcance</li>
            <li class="menu-submenu">
                Condições >
                <ul class="submenu">
                    <li onclick="toggleStatus('blood')">Sangramento</li>
                    <li onclick="toggleStatus('poison')">Veneno</li>
                    <li onclick="toggleStatus('shield')">Escudo</li>
                    <li onclick="toggleStatus('stun')">Atordoado</li>
                </ul>
            </li>
            <li id="menu-delete" style="color: #ff4444;">Excluir</li>
        </ul>
    </div>

    <!-- MODAIS GENÉRICOS (CUSTOM) -->
    <div id="custom-modal-container" class="hidden">
        <div class="modal-content custom-modal">
            <h3 id="custom-modal-title">Aviso</h3>
            <p id="custom-modal-message"></p>
            <input type="text" id="custom-modal-input" class="hidden" placeholder="Digite aqui...">
            <div class="custom-modal-actions">
                <button id="custom-modal-btn-cancel" class="hidden">Cancelar</button>
                <button id="custom-modal-btn-ok">OK</button>
            </div>
        </div>
    </div>
</body>
</html>
